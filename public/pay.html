<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Pembayaran</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* Tampilan Form Awal */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
        }
        h2 { color: #333; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button.btn-pay { width: 100%; background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button.btn-pay:hover { background-color: #218838; }
        
        /* CSS untuk Webview Fullscreen */
        #payment-frame { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            border: none; 
            display: none; 
            z-index: 999; 
            background-color: white;
        }
        
        /* Tombol Melayang untuk Kembali/Menutup webview */
        #btnClose { 
            position: fixed; 
            top: 15px; 
            right: 15px; 
            background-color: #dc3545; 
            color: white; 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold;
            display: none; 
            z-index: 1000; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        #btnClose:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <button id="btnClose" onclick="closeWebview()">Kembali</button>

    <iframe id="payment-frame" src=""></iframe>

    <div class="card" id="form-container">
        <h2>Checkout</h2>
        <p style="font-size: 14px; color: #555;">Masukkan nominal pembayaran.</p>
        
        <label for="amount" style="font-size: 14px; font-weight: bold; text-align: left; display: block;">Nominal (Rp):</label>
        <input type="number" id="amount" placeholder="Contoh: 10000" required>
        
        <button class="btn-pay" onclick="openWebview()">Bayar Sekarang</button>
    </div>

    <script>
        const PROJECT_SLUG = "ray"; 

        function openWebview() {
            const amountInput = document.getElementById("amount").value;
            
            if (!amountInput || amountInput <= 0) {
                alert("Masukkan nominal pembayaran yang valid!");
                return;
            }

            const orderId = "ray-" + new Date().getTime(); 
            const urlPakasir = `https://app.pakasir.com/pay/${PROJECT_SLUG}/${amountInput}?order_id=${orderId}`;
            
            // 1. Sembunyikan form input
            document.getElementById("form-container").style.display = "none";
            
            // 2. Munculkan Iframe Fullscreen dan set link-nya
            const iframe = document.getElementById("payment-frame");
            iframe.src = urlPakasir;
            iframe.style.display = "block";
            
            // 3. Munculkan tombol "Kembali" melayang
            document.getElementById("btnClose").style.display = "block";
        }

        function closeWebview() {
            // Tampilkan kembali form awal
            document.getElementById("form-container").style.display = "block";
            
            // Sembunyikan & reset iframe
            const iframe = document.getElementById("payment-frame");
            iframe.src = ""; 
            iframe.style.display = "none";
            
            // Sembunyikan tombol tutup
            document.getElementById("btnClose").style.display = "none";
        }
    </script>
</body>
</html>
