<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RayStore-Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #09090b;
            --bg-glass: rgba(30, 30, 40, 0.6);
            --primary: #6d28d9;
            --accent: #d946ef; /* Magenta Neon */
            --text-main: #ffffff;
            --card-border: rgba(255,255,255,0.08);
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at top right, #2e1065, transparent 40%), 
                              radial-gradient(circle at bottom left, #be185d, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            padding: 30px 20px 10px 20px;
        }
        .header h3 { font-weight: 800; letter-spacing: -1px; background: linear-gradient(to right, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* NAV KATEGORI (RAPIH & CENTER) */
        .cat-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .cat-item {
            background: var(--bg-glass);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            color: #94a3b8;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cat-item.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(217, 70, 239, 0.4);
        }

        /* PROVIDER LIST (HORIZONTAL SCROLL) */
        .scroll-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 10px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .prov-card {
            display: inline-block;
            width: 100px;
            margin-right: 10px;
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            vertical-align: top;
        }
        .prov-card i { font-size: 24px; margin-bottom: 8px; color: var(--accent); }
        .prov-card span { display: block; font-size: 11px; font-weight: 600; white-space: normal; line-height: 1.2; color: #e2e8f0; }
        
        .prov-card.selected {
            background: #2e1065;
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .prov-card.selected i { color: #fff; }

        /* INPUTS */
        .glass-panel {
            background: var(--bg-glass);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .input-custom {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
            width: 100%;
            outline: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .input-custom:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(217, 70, 239, 0.2); }
        .lbl-input { font-size: 10px; font-weight: 700; color: #a78bfa; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }

        /* PRODUCT GRID */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .item-card {
            background: linear-gradient(180deg, rgba(40,40,50,0.8), rgba(20,20,30,0.9));
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }
        .item-card:hover { border-color: var(--accent); background: rgba(50,50,70,0.9); }
        .item-card::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: var(--accent); transform: scaleX(0); transition: 0.3s; transform-origin: left;
        }
        .item-card:hover::after { transform: scaleX(1); }
        
        .price-tag { font-size: 15px; font-weight: 700; color: #fff; margin-top: 5px; }
        .name-tag { font-size: 12px; color: #94a3b8; line-height: 1.3; font-weight: 500; }

        /* Modal */
        .modal-content { background: #1c1917; border: 1px solid #444; color: white; border-radius: 20px; }
        .btn-close { filter: invert(1); }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h3 class="m-0"><i class="fas fa-bolt text-warning me-2"></i>RAYSTORE</h3>
        <p class="m-0 text-muted" style="font-size: 12px;">Top Up Tercepat & Aman</p>
    </div>
    <span id="loadingBadge" class="badge bg-dark border border-secondary p-2"><i class="fas fa-sync fa-spin"></i> Load</span>
</div>

<div class="container">
    
    <div class="cat-container">
        <div class="cat-item active" onclick="setCat('Games', this)"><i class="fas fa-gamepad"></i> Games</div>
        <div class="cat-item" onclick="setCat('Pulsa', this)"><i class="fas fa-mobile-alt"></i> Pulsa</div>
        <div class="cat-item" onclick="setCat('Data', this)"><i class="fas fa-wifi"></i> Data</div>
        <div class="cat-item" onclick="setCat('Apps', this)"><i class="fas fa-crown text-warning"></i> Apps</div>
        <div class="cat-item" onclick="setCat('PLN', this)"><i class="fas fa-bolt text-warning"></i> PLN</div>
    </div>

    <div class="mb-4">
        <label class="lbl-input ps-2">PILIH LAYANAN</label>
        <div class="scroll-wrapper" id="provContainer">
            <div class="text-center py-2 text-muted small w-100">Memuat data...</div>
        </div>
        <input type="hidden" id="selProv"> 
    </div>

    <div class="glass-panel">
        <div id="dynamicInputArea">
            <label class="lbl-input" id="lblTarget">USER ID</label>
            <div id="boxSingle">
                <input type="text" id="valSingle" class="input-custom" placeholder="Masukkan ID">
            </div>
            
            <div id="boxDual" class="row g-2 d-none">
                <div class="col-7"><input type="tel" id="valId" class="input-custom" placeholder="User ID"></div>
                <div class="col-5"><input type="tel" id="valZone" class="input-custom" placeholder="Zone ID"></div>
            </div>
            <small id="hintText" class="text-muted d-block mt-2" style="font-size: 10px;">*Pastikan data benar</small>
        </div>
    </div>

    <label class="lbl-input ps-2">PILIH ITEM</label>
    <div id="areaList" class="item-grid mb-5">
        <div class="text-center text-muted py-5" style="grid-column: span 2;">
            <i class="fas fa-hand-pointer fa-2x mb-2 opacity-50"></i><br>Pilih layanan di atas dulu
        </div>
    </div>

</div>

<div class="modal fade" id="modalTrx" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
            <div class="modal-header border-0 p-0 mb-2">
                <h6 class="fw-bold text-uppercase w-100">Pembayaran</h6>
            </div> 
            
            <div class="modal-body p-0">
                <div id="v-qris" class="d-none">
                    <h2 class="fw-bold text-white mb-3" id="txtPrice">Rp 0</h2>
                    <div class="bg-white p-2 rounded d-inline-block mb-3">
                        <img id="imgQr" src="" class="img-fluid rounded" style="max-height: 200px;">
                    </div>
                    <div class="alert alert-dark border border-secondary py-2 small">
                        <div class="spinner-border spinner-border-sm text-warning me-1"></div> Menunggu scan...
                    </div>
                    <button class="btn btn-outline-danger w-100 rounded-pill btn-sm" onclick="cancelPay()">Batalkan</button>
                </div>

                <div id="v-succ" class="d-none py-2">
                    <i class="fas fa-check-circle text-success fa-4x mb-3"></i>
                    <h4>Berhasil!</h4>
                    <p class="small text-muted">Transaksi sukses diproses.</p>
                    <div class="bg-dark p-2 rounded border border-secondary text-break font-monospace small" id="txtSn"></div>
                    <button class="btn btn-primary w-100 rounded-pill mt-3" onclick="clsModal()">Tutup</button>
                </div>

                <div id="v-fail" class="d-none py-2">
                    <i class="fas fa-times-circle text-danger fa-4x mb-3"></i>
                    <h4>Gagal</h4>
                    <p class="small text-danger" id="txtErr">Error</p>
                    <button class="btn btn-secondary w-100 rounded-pill" onclick="clsModal()">Tutup</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    let db = [];
    let cat = 'Games';
    let timer;
    let currId = null;
    let metaData = {};

    window.onload = async () => {
        try {
            const res = await axios.get('/api/services');
            if(res.data.status) {
                db = res.data.data;
                document.getElementById('loadingBadge').style.display = 'none';
                renderProviders(); // Panggil fungsi render baru
            }
        } catch(e) {
            document.getElementById('loadingBadge').innerText = 'Error';
            document.getElementById('loadingBadge').classList.replace('bg-dark', 'bg-danger');
        }
    };

    function setCat(c, el) {
        cat = c;
        // Update Nav Styles
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        // Reset Inputs based on Category (SMART INPUT LOGIC)
        const lbl = document.getElementById('lblTarget');
        const inp = document.getElementById('valSingle');
        const hint = document.getElementById('hintText');
        
        document.getElementById('boxSingle').classList.remove('d-none');
        document.getElementById('boxDual').classList.add('d-none');
        document.getElementById('selProv').value = ''; // Reset pilihan provider
        document.getElementById('areaList').innerHTML = '<div class="text-center text-muted py-5" style="grid-column: span 2;">Silakan pilih layanan...</div>';

        if(cat === 'Apps') {
            lbl.innerText = 'EMAIL / ID AKUN';
            inp.placeholder = 'contoh: nama@email.com';
            inp.type = 'email';
            hint.innerText = '*Pastikan email aktif dan benar';
        } else if(cat === 'Pulsa' || cat === 'Data') {
            lbl.innerText = 'NOMOR HANDPHONE';
            inp.placeholder = '08xxxxxxxxxx';
            inp.type = 'tel';
            hint.innerText = '*Gunakan awalan 08';
        } else if(cat === 'PLN') {
            lbl.innerText = 'NOMOR METER / ID PEL';
            inp.placeholder = 'Masukkan Nomor Meter';
            inp.type = 'tel';
            hint.innerText = '*Cek ulang nomor meter';
        } else {
            lbl.innerText = 'USER ID';
            inp.placeholder = 'Masukkan User ID';
            hint.innerText = '*Masukkan ID dengan benar';
        }

        renderProviders();
    }

    // FUNGSI RENDER PROVIDER BARU (PAKAI KARTU/CARD)
    function renderProviders() {
        const div = document.getElementById('provContainer');
        div.innerHTML = '';
        
        const ps = new Set();
        db.forEach(i => {
            if(i.status !== 'available') return;
            const c = (i.category || '').toLowerCase();
            const n = (i.name || '').toLowerCase();
            const brand = i.brand || i.provider || 'Others';
            
            let m = false;
            // Logic filter yang sama
            if(cat==='Games' && (c.includes('games') || i.type === 'game' || c.includes('voucher'))) m=true;
            else if(cat==='Pulsa' && c.includes('pulsa')) m=true;
            else if(cat==='Data' && (c.includes('data') || c.includes('kuota') || c.includes('internet'))) m=true;
            else if(cat==='PLN' && c.includes('pln')) m=true;
            else if(cat==='Apps') {
                if(c.includes('streaming') || c.includes('premium') || n.includes('netflix') || n.includes('spotify') || n.includes('vidio') || n.includes('youtube')) m=true;
            }
            if(m) ps.add(brand);
        });

        const sorted = Array.from(ps).sort();
        
        if(sorted.length === 0) {
            div.innerHTML = '<div class="text-muted small ps-2">Tidak ada layanan tersedia</div>';
            return;
        }

        // Render Cards
        sorted.forEach(p => {
            // Tentukan icon sederhana berdasarkan nama (opsional, biar gak polos)
            let icon = 'fa-gamepad';
            const pl = p.toLowerCase();
            if(pl.includes('telkomsel')) icon = 'fa-signal';
            else if(pl.includes('indosat') || pl.includes('xl')) icon = 'fa-tower-cell';
            else if(pl.includes('pln')) icon = 'fa-bolt';
            else if(pl.includes('dana') || pl.includes('gopay')) icon = 'fa-wallet';
            else if(pl.includes('mobile legends')) icon = 'fa-shield-halved';
            else if(pl.includes('free fire')) icon = 'fa-crosshairs';
            else if(pl.includes('google')) icon = 'fa-play';
            else if(cat === 'Apps') icon = 'fa-film';

            div.innerHTML += `
            <div class="prov-card" onclick="selectProvider('${p}', this)">
                <i class="fas ${icon}"></i>
                <span>${p}</span>
            </div>`;
        });
    }

    // FUNGSI SAAT PROVIDER DI KLIK
    function selectProvider(val, el) {
        document.getElementById('selProv').value = val;
        
        // Visual Active State
        document.querySelectorAll('.prov-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');

        renderItems();
    }

    function renderItems() {
        const prov = document.getElementById('selProv').value;
        const div = document.getElementById('areaList');
        div.innerHTML = '';
        if(!prov) return;

        // Cek Khusus MLBB
        const isML = prov.toLowerCase().includes('mobile legends') || prov.toLowerCase().includes('mlbb');
        if(isML) {
            document.getElementById('boxSingle').classList.add('d-none');
            document.getElementById('boxDual').classList.remove('d-none');
            document.getElementById('lblTarget').innerText = 'USER ID & ZONE';
            document.getElementById('hintText').innerText = '*Contoh: 12345678 (1234)';
        } else {
            document.getElementById('boxDual').classList.add('d-none');
            document.getElementById('boxSingle').classList.remove('d-none');
            // Label sudah di set di setCat, jadi aman
        }

        const list = db.filter(i => (i.brand === prov || i.provider === prov) && i.status === 'available');
        list.sort((a,b) => parseInt(a.price) - parseInt(b.price));

        list.forEach(i => {
            const modal = parseInt(i.price);
            const sell = Math.ceil((modal + 700) / 0.986); // Margin profit
            
            div.innerHTML += `
            <div class="item-card" onclick="pay('${i.code}', '${i.price}')">
                <div class="name-tag">${i.name}</div>
                <div class="price-tag text-end">Rp ${sell.toLocaleString('id-ID')}</div>
            </div>`;
        });
    }

    async function pay(code, raw) {
        const prov = document.getElementById('selProv').value.toLowerCase();
        let target = '';

        if(prov.includes('mobile legends') || prov.includes('mlbb')) {
            const id = document.getElementById('valId').value;
            const zone = document.getElementById('valZone').value;
            if(!id || !zone) return Swal.fire({title:'Eits!', text:'ID dan Zone harus diisi', icon:'warning', background:'#1c1917', color:'#fff'});
            target = `${zone}|${id}`;
        } else {
            target = document.getElementById('valSingle').value;
            let msg = 'Nomor/ID tujuan belum diisi!';
            if(cat === 'Apps') msg = 'Email/ID belum diisi!';
            
            if(target.length < 4) return Swal.fire({title:'Eits!', text:msg, icon:'warning', background:'#1c1917', color:'#fff'});
        }

        const m = new bootstrap.Modal(document.getElementById('modalTrx'));
        m.show();
        
        document.getElementById('v-qris').classList.add('d-none');
        document.getElementById('v-succ').classList.add('d-none');
        document.getElementById('v-fail').classList.add('d-none');

        try {
            const res = await axios.post('/api/create-payment', {
                service_code: code,
                target: target,
                price_original: raw
            });

            if(res.data.status) {
                const d = res.data.data;
                metaData = d.meta;
                currId = d.deposit_id;
                
                document.getElementById('imgQr').src = d.qr_image;
                document.getElementById('txtPrice').innerText = 'Rp ' + d.amount.toLocaleString('id-ID');
                document.getElementById('v-qris').classList.remove('d-none');
                chk(d.deposit_id);
            } else {
                Swal.fire('Gagal', res.data.message, 'error');
                clsModal();
            }
        } catch(e) {
            Swal.fire('Error', 'Server Error', 'error');
            clsModal();
        }
    }

    function chk(id) {
        if(timer) clearInterval(timer);
        timer = setInterval(async () => {
            try {
                const res = await axios.post('/api/check-status', { deposit_id: id, meta: metaData });
                if(res.data.state === 'success') {
                    clearInterval(timer);
                    document.getElementById('v-qris').classList.add('d-none');
                    document.getElementById('v-succ').classList.remove('d-none');
                    document.getElementById('txtSn').innerText = res.data.sn;
                } else if(res.data.state === 'failed') {
                    clearInterval(timer);
                    document.getElementById('v-qris').classList.add('d-none');
                    document.getElementById('v-fail').classList.remove('d-none');
                    document.getElementById('txtErr').innerText = res.data.message;
                }
            } catch(e){}
        }, 3000);
    }

    async function cancelPay() {
        if(timer) clearInterval(timer);
        const m = bootstrap.Modal.getInstance(document.getElementById('modalTrx'));
        m.hide();
        if(currId) { try { await axios.post('/api/cancel-payment', { deposit_id: currId }); } catch(e) {} }
    }

    function clsModal() {
        if(timer) clearInterval(timer);
        const m = bootstrap.Modal.getInstance(document.getElementById('modalTrx'));
        m.hide();
    }
</script>

</body>
</html>
