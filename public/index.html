<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store Topup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: sans-serif; padding-bottom: 80px; }

        .header { background: var(--primary); color: white; padding: 20px 20px 60px 20px; border-radius: 0 0 25px 25px; }
        
        .main-card {
            background: white; border-radius: 20px; margin: -40px 15px 20px 15px;
            padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        /* Menu Tabs */
        .nav-pills .nav-link { 
            color: #64748b; font-size: 11px; font-weight: 600; 
            border: 1px solid #f1f5f9; margin-right: 5px; border-radius: 10px;
        }
        .nav-pills .nav-link.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        .nav-pills .nav-link i { display: block; font-size: 18px; margin-bottom: 4px; }

        /* Input Modern */
        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 5px; display: block; }
        .input-box {
            background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 10px 15px; display: flex; align-items: center;
        }
        .input-box input, .input-box select {
            border: none; background: transparent; width: 100%; outline: none; font-weight: 600; font-size: 14px;
        }

        /* List Produk */
        .prod-item {
            background: white; padding: 15px; border-radius: 14px; margin-bottom: 10px;
            border: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .prod-item:hover { border-color: var(--primary); background: #eff6ff; }
        .prod-name { font-size: 13px; font-weight: 600; color: #1e293b; }
        .prod-price { font-size: 14px; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <h4 class="fw-bold m-0">⚡ FastStore</h4>
    <p class="small opacity-75 m-0">Topup Murah & Otomatis</p>
</div>

<div class="main-card">
    
    <ul class="nav nav-pills nav-fill mb-4">
        <li class="nav-item" onclick="setCat('Games')">
            <a class="nav-link active" href="#"><i class="fas fa-gamepad"></i>Games</a>
        </li>
        <li class="nav-item" onclick="setCat('Pulsa')">
            <a class="nav-link" href="#"><i class="fas fa-mobile-alt"></i>Pulsa</a>
        </li>
        <li class="nav-item" onclick="setCat('Data')">
            <a class="nav-link" href="#"><i class="fas fa-wifi"></i>Data</a>
        </li>
        <li class="nav-item" onclick="setCat('PLN')">
            <a class="nav-link" href="#"><i class="fas fa-bolt"></i>PLN</a>
        </li>
    </ul>

    <div class="form-group">
        <label class="form-label" id="lblTarget">NOMOR / ID TUJUAN</label>
        
        <div id="boxSingle" class="input-box">
            <input type="tel" id="valSingle" placeholder="Masukkan Nomor / ID">
        </div>

        <div id="boxDual" class="d-none row g-2">
            <div class="col-7">
                <div class="input-box">
                    <input type="tel" id="valId" placeholder="User ID (cth: 123456)">
                </div>
            </div>
            <div class="col-5">
                <div class="input-box">
                    <input type="tel" id="valZone" placeholder="Zone (cth: 2021)">
                </div>
            </div>
        </div>
        <small class="text-muted d-block mt-1 ms-1" style="font-size: 10px;" id="txtHint">*Pastikan nomor benar</small>
    </div>

    <div class="form-group">
        <label class="form-label">PILIH PROVIDER</label>
        <div class="input-box">
            <select id="selProv" onchange="renderItems()">
                <option value="">Pilih...</option>
            </select>
        </div>
    </div>

    <div id="areaList" class="mt-4">
        <div class="text-center py-5 text-muted opacity-50">
            <i class="fas fa-box-open fa-2x mb-2"></i>
            <p class="small">Pilih provider dulu</p>
        </div>
    </div>
</div>

<div class="modal fade" id="modalTrx" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3 text-center">
            <div class="modal-header border-0 p-0"><button class="btn-close ms-auto" onclick="clsModal()"></button></div>
            <div class="modal-body p-0">
                
                <div id="v-qris" class="d-none">
                    <h5 class="fw-bold">Scan QRIS</h5>
                    <p class="small text-muted mb-0">Total Bayar</p>
                    <h2 class="text-primary fw-bold" id="txtPrice">Rp 0</h2>
                    <div class="my-3 border rounded p-2 d-inline-block">
                        <img id="imgQr" src="" class="img-fluid rounded" style="max-height: 250px;">
                    </div>
                    <div class="alert alert-warning small py-1 fw-bold">
                        <div class="spinner-grow spinner-grow-sm me-1"></div> Menunggu Pembayaran...
                    </div>
                </div>

                <div id="v-succ" class="d-none py-3">
                    <i class="fas fa-check-circle text-success fa-4x mb-3"></i>
                    <h4 class="fw-bold">Berhasil!</h4>
                    <p class="small text-muted">Produk sedang dikirim.</p>
                    <div class="bg-light p-2 rounded text-start"><small>SN: <b id="txtSn">-</b></small></div>
                    <button class="btn btn-primary w-100 rounded-pill mt-3" onclick="clsModal()">OK</button>
                </div>

                <div id="v-fail" class="d-none py-3">
                    <i class="fas fa-times-circle text-danger fa-4x mb-3"></i>
                    <h5>Gagal</h5>
                    <p class="small text-danger" id="txtErr">Error</p>
                    <button class="btn btn-outline-danger w-100 rounded-pill" onclick="clsModal()">Tutup</button>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    let db = [];
    let cat = 'Games';
    let timer;
    let metaData = {};

    window.onload = async () => {
        try {
            const res = await axios.get('/api/services');
            if(res.data.status) {
                db = res.data.data;
                popProv();
            }
        } catch(e) {}
    };

    function setCat(c) {
        cat = c;
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        event.target.closest('.nav-link').classList.add('active');
        
        popProv();
        document.getElementById('areaList').innerHTML = '';
        
        // Reset Input State
        document.getElementById('boxSingle').classList.remove('d-none');
        document.getElementById('boxDual').classList.add('d-none');
        document.getElementById('txtHint').innerText = '*Pastikan data benar';
    }

    // Logic Populate Provider (Lebih Robust)
    function popProv() {
        const sel = document.getElementById('selProv');
        sel.innerHTML = '<option value="">Pilih...</option>';
        const ps = new Set();

        db.forEach(i => {
            if(i.status !== 'available') return;
            // Normalisasi data biar gak error
            const c = (i.category || '').toLowerCase();
            const n = (i.name || '').toLowerCase();
            const t = (i.type || '').toLowerCase();
            const brand = i.brand || i.provider || 'Others';
            
            let m = false;

            if(cat==='Games' && (c.includes('games') || t.includes('games') || c.includes('voucher'))) m=true;
            else if(cat==='Pulsa' && c.includes('pulsa')) m=true;
            else if(cat==='Data' && (c.includes('data') || c.includes('kuota') || c.includes('internet'))) m=true;
            else if(cat==='PLN' && c.includes('pln')) m=true;

            if(m) ps.add(brand);
        });

        // Sortir A-Z biar rapi
        Array.from(ps).sort().forEach(p => {
            sel.innerHTML += `<option value="${p}">${p}</option>`;
        });
    }

    // Render & Input Detector
    function renderUI() {
        const prov = document.getElementById('selProv').value;
        const div = document.getElementById('areaList');
        div.innerHTML = '';
        if(!prov) return;

        // DETEKSI MLBB
        const isML = prov.toLowerCase().includes('mobile legends') || prov.toLowerCase().includes('mlbb');
        
        if(isML) {
            document.getElementById('boxSingle').classList.add('d-none');
            document.getElementById('boxDual').classList.remove('d-none');
            document.getElementById('lblTarget').innerText = 'ID GAME & ZONE';
            document.getElementById('txtHint').innerText = '*Masukkan User ID dan Zone ID';
        } else {
            document.getElementById('boxDual').classList.add('d-none');
            document.getElementById('boxSingle').classList.remove('d-none');
            document.getElementById('lblTarget').innerText = 'NOMOR / ID TUJUAN';
            document.getElementById('txtHint').innerText = '*Pastikan nomor tujuan benar';
        }

        // FILTER PRODUK (Loose Filter biar semua masuk)
        const list = db.filter(i => {
            const b = i.brand || i.provider;
            return b === prov && i.status === 'available';
        });
        
        list.sort((a,b) => parseInt(a.price) - parseInt(b.price));

        list.forEach(i => {
            // KALKULASI DISPLAY HARGA
            const modal = parseInt(i.price);
            // (Modal + 500 + 200) / 0.986
            const sell = Math.ceil((modal + 700) / 0.986);
            
            div.innerHTML += `
            <div class="prod-item" onclick="pay('${i.code}', '${i.price}')">
                <div style="flex:1">
                    <div class="prod-name">${i.name}</div>
                    <div class="text-muted small" style="font-size:10px">${i.code}</div>
                </div>
                <div class="prod-price">Rp ${sell.toLocaleString('id-ID')}</div>
            </div>`;
        });
    }

    async function pay(code, raw) {
        const prov = document.getElementById('selProv').value.toLowerCase();
        let target = '';

        // LOGIC GABUNG FORMAT TARGET
        if(prov.includes('mobile legends') || prov.includes('mlbb')) {
            const id = document.getElementById('valId').value;
            const zone = document.getElementById('valZone').value;
            if(!id || !zone) return Swal.fire('Eits', 'Isi ID dan Zone dulu!', 'warning');
            
            // FORMAT: ZONEID|USERID
            target = `${zone}|${id}`;
        } else {
            target = document.getElementById('valSingle').value;
            if(target.length < 4) return Swal.fire('Eits', 'Isi nomor tujuan dulu!', 'warning');
        }

        const m = new bootstrap.Modal(document.getElementById('modalTrx'));
        m.show();
        
        document.getElementById('v-qris').classList.add('d-none');
        document.getElementById('v-succ').classList.add('d-none');
        document.getElementById('v-fail').classList.add('d-none');

        try {
            const res = await axios.post('/api/create-payment', {
                service_code: code,
                target: target,
                price_original: raw
            });

            if(res.data.status) {
                const d = res.data.data;
                metaData = d.meta;
                document.getElementById('imgQr').src = d.qr_image;
                document.getElementById('txtPrice').innerText = 'Rp ' + d.amount.toLocaleString('id-ID');
                document.getElementById('v-qris').classList.remove('d-none');
                chk(d.deposit_id);
            } else {
                Swal.fire('Gagal', res.data.message, 'error');
                clsModal();
            }
        } catch(e) {
            Swal.fire('Error', 'Server Error', 'error');
            clsModal();
        }
    }

    function chk(id) {
        if(timer) clearInterval(timer);
        timer = setInterval(async () => {
            try {
                const res = await axios.post('/api/check-status', { deposit_id: id, meta: metaData });
                const st = res.data.state;

                if(st === 'success') {
                    clearInterval(timer);
                    document.getElementById('v-qris').classList.add('d-none');
                    document.getElementById('v-succ').classList.remove('d-none');
                    document.getElementById('txtSn').innerText = res.data.sn;
                } else if(st === 'failed') {
                    clearInterval(timer);
                    document.getElementById('v-qris').classList.add('d-none');
                    document.getElementById('v-fail').classList.remove('d-none');
                    document.getElementById('txtErr').innerText = res.data.message;
                }
            } catch(e){}
        }, 3000);
    }

    function clsModal() {
        if(timer) clearInterval(timer);
        const m = bootstrap.Modal.getInstance(document.getElementById('modalTrx'));
        m.hide();
    }
</script>

</body>
</html>
