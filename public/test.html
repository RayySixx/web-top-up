<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaFlow - Fast File Hosting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen font-sans">

  <div class="max-w-md w-full p-6 bg-gray-800 rounded-2xl shadow-2xl border border-gray-700">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">MediaFlow</h1>
      <p class="text-gray-400 text-sm mt-1">Upload dan bagikan media lu. Maks 20MB.</p>
    </div>

    <div id="dropzone" class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center hover:border-blue-500 hover:bg-gray-700 transition cursor-pointer relative" onclick="document.getElementById('fileInput').click()">
      <div id="uploadContent">
        <svg class="mx-auto h-12 w-12 text-gray-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        <p id="statusText" class="text-gray-300 font-medium">Klik atau drop file di sini</p>
      </div>
      <input type="file" id="fileInput" class="hidden" />
    </div>

    <div id="resultArea" class="mt-6 hidden">
      <p class="text-sm text-green-400 mb-2 font-medium">✨ Upload Sukses!</p>
      <div class="flex items-center bg-gray-900 p-2 rounded-lg border border-gray-700">
        <input type="text" id="urlOutput" class="w-full bg-transparent outline-none text-sm text-gray-300 px-2" readonly />
        <button onclick="copyToClipboard()" class="ml-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white text-xs px-4 py-2 rounded transition font-bold">Copy</button>
      </div>
      <button onclick="resetUploader()" class="w-full mt-4 text-sm text-gray-400 hover:text-white transition">Upload file lain</button>
    </div>
  </div>

  <script>
    // ⚠️ WAJIB GANTI BAGIAN INI SAMA PUNYA LU ⚠️
    const SUPABASE_URL = 'https://whqlpszmydukjwyyexnf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndocWxwc3pteWR1a2p3eXlleG5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjg0OTEsImV4cCI6MjA4ODcwNDQ5MX0.6z3jvw9oH-e2N8p3FVG5p2Qcu9ABZ-FU4zynQ1A5CcQ'; 
    
    // Inisialisasi Supabase
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const fileInput = document.getElementById('fileInput');
    const statusText = document.getElementById('statusText');
    const dropzone = document.getElementById('dropzone');
    const resultArea = document.getElementById('resultArea');
    const urlOutput = document.getElementById('urlOutput');

    // Langsung auto-upload pas file dipilih
    fileInput.addEventListener('change', async (e) => {
      const selectedFile = e.target.files[0];
      if (!selectedFile) return;

      // Cek ukuran file maks 20MB
      if (selectedFile.size > 20 * 1024 * 1024) {
        alert('Bro, filenya kegedean! Maksimal 20MB ya.');
        fileInput.value = ''; // Reset input
        return;
      }

      // Ubah UI jadi mode Loading
      dropzone.classList.add('opacity-50', 'pointer-events-none');
      statusText.innerHTML = `Uploading <span class="text-blue-400">${selectedFile.name}</span>... <br><span class="text-xs text-gray-400">Tunggu bentar bro...</span>`;

      // Bikin nama file unik biar gak bentrok
      const fileExt = selectedFile.name.split('.').pop();
      const uniqueFileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;

      try {
        // Upload ke Supabase (Pastikan nama bucket 'media-hosting')
        const { data, error } = await supabase.storage
          .from('media-hosting')
          .upload(uniqueFileName, selectedFile);

        if (error) throw error;

        // Ambil URL public
        const { data: publicUrlData } = supabase.storage
          .from('media-hosting')
          .getPublicUrl(uniqueFileName);

        // Tampilin URL-nya
        urlOutput.value = publicUrlData.publicUrl;
        resultArea.classList.remove('hidden');
        dropzone.classList.add('hidden'); // Sembunyiin kotak dropzone
        
      } catch (error) {
        alert('Gagal upload bro: ' + error.message);
        resetUploader();
      }
    });

    function copyToClipboard() {
      urlOutput.select();
      document.execCommand('copy');
      alert('URL udah di-copy ke clipboard!');
    }

    function resetUploader() {
      fileInput.value = '';
      resultArea.classList.add('hidden');
      dropzone.classList.remove('hidden', 'opacity-50', 'pointer-events-none');
      statusText.textContent = 'Klik atau drop file di sini';
    }
  </script>
</body>
</html>
