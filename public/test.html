<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ray's Private Host</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    /* Custom Animation buat efek modern */
    @keyframes gradient-xy {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .animate-gradient {
      background-size: 200% 200%;
      animation: gradient-xy 8s ease infinite;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center justify-center font-sans relative overflow-hidden">

  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="max-w-md w-full p-8 bg-slate-900/60 backdrop-blur-xl rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-slate-700/50 relative z-10 m-4">
    
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 mb-4 shadow-lg shadow-blue-500/30">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-wide">Ray's Vault</h1>
      <p class="text-slate-400 text-sm mt-1">Private Media Hosting &bull; Max 20MB</p>
    </div>

    <div id="statusBox" class="mb-5 text-center hidden transition-all duration-300">
      <p id="statusText" class="text-sm font-medium text-blue-400 bg-blue-500/10 py-2 px-4 rounded-lg border border-blue-500/20 animate-pulse"></p>
    </div>

    <div id="uploadContainer">
      <button id="pilihBtn" class="w-full group relative flex flex-col items-center justify-center p-8 border-2 border-dashed border-slate-600 rounded-2xl bg-slate-800/30 hover:bg-slate-800/80 hover:border-blue-500 transition-all duration-300 cursor-pointer overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-purple-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <svg class="h-10 w-10 text-slate-400 group-hover:text-blue-400 transition-colors mb-3 transform group-hover:-translate-y-1 duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        <span class="text-slate-300 font-medium group-hover:text-white transition-colors">Tap buat pilih file</span>
        <span class="text-xs text-slate-500 mt-1">atau drag ke sini</span>
      </button>
      <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" />
    </div>

    <div id="resultArea" class="mt-2 hidden">
      <div id="previewContainer" class="mb-4 hidden">
        <img id="previewImg" class="w-full h-40 object-cover rounded-xl border border-slate-700 shadow-md" src="" alt="Preview">
      </div>

      <p class="text-xs text-emerald-400 mb-2 font-semibold uppercase tracking-wider text-center">Upload Berhasil</p>
      
      <div class="flex items-center bg-slate-950/50 p-1.5 rounded-xl border border-slate-700/50 shadow-inner">
        <input type="text" id="urlOutput" class="w-full bg-transparent outline-none text-sm text-slate-300 px-3" readonly />
        <button id="copyBtn" class="ml-2 bg-blue-600 hover:bg-blue-500 text-white text-sm px-4 py-2 rounded-lg transition-all shadow-lg font-medium">Copy</button>
      </div>

      <button id="resetBtn" class="w-full mt-5 text-sm text-slate-400 hover:text-white transition-colors flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        Upload File Lain
      </button>
    </div>
  </div>

  <div class="relative z-10 text-xs text-slate-600 mt-4 tracking-widest uppercase">
    System: Active &bull; Vercel Deployment
  </div>

  <script>
    const SUPABASE_URL = 'https://whqlpszmydukjwyyexnf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndocWxwc3pteWR1a2p3eXlleG5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjg0OTEsImV4cCI6MjA4ODcwNDQ5MX0.6z3jvw9oH-e2N8p3FVG5p2Qcu9ABZ-FU4zynQ1A5CcQ'; 
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const fileInput = document.getElementById('fileInput');
    const pilihBtn = document.getElementById('pilihBtn');
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const uploadContainer = document.getElementById('uploadContainer');
    const resultArea = document.getElementById('resultArea');
    const urlOutput = document.getElementById('urlOutput');
    const copyBtn = document.getElementById('copyBtn');
    const resetBtn = document.getElementById('resetBtn');
    const previewContainer = document.getElementById('previewContainer');
    const previewImg = document.getElementById('previewImg');

    pilihBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 20 * 1024 * 1024) {
        alert('Bro, filenya kegedean! Maksimal 20MB ya.');
        fileInput.value = ''; 
        return;
      }

      // Animasi Loading
      uploadContainer.classList.add('hidden');
      statusBox.classList.remove('hidden');
      statusText.innerHTML = `Encrypting & Uploading...<br><span class="text-slate-300 text-xs">${file.name}</span>`;

      const fileExt = file.name.split('.').pop();
      const uniqueFileName = `ray-${Date.now()}.${fileExt}`;

      try {
        const { data, error } = await sb.storage
          .from('media-hosting')
          .upload(uniqueFileName, file);

        if (error) throw error;

        const { data: urlData } = sb.storage
          .from('media-hosting')
          .getPublicUrl(uniqueFileName);

        const finalUrl = urlData.publicUrl;
        
        // Nampilin hasil
        statusBox.classList.add('hidden');
        urlOutput.value = finalUrl;
        resultArea.classList.remove('hidden');
        
        // Tampilkan preview kalau yang diupload gambar
        if(file.type.startsWith('image/')) {
          previewImg.src = finalUrl;
          previewContainer.classList.remove('hidden');
        } else {
          previewContainer.classList.add('hidden');
        }
        
      } catch (err) {
        alert("Gagal: " + err.message);
        uploadContainer.classList.remove('hidden');
        statusBox.classList.add('hidden');
      } finally {
        fileInput.value = ''; 
      }
    });

    copyBtn.addEventListener('click', () => {
      urlOutput.select();
      document.execCommand('copy');
      copyBtn.innerText = "Copied!";
      copyBtn.classList.replace('bg-blue-600', 'bg-emerald-500');
      setTimeout(() => {
        copyBtn.innerText = "Copy";
        copyBtn.classList.replace('bg-emerald-500', 'bg-blue-600');
      }, 2000);
    });

    resetBtn.addEventListener('click', () => {
      resultArea.classList.add('hidden');
      uploadContainer.classList.remove('hidden');
      previewImg.src = "";
    });
  </script>
</body>
</html>
